let currentL1 = 'robot';

function renderMenu() {
    const c = document.getElementById('menu-container');
    const d = siteData[currentL1];
    let h = '';
    for (const k in d.sub) {
        h += `<div class="level-2-group"><h3>${k}</h3>`;
        d.sub[k].forEach(i => h += `<div class="level-2-item" data-l2="${k}" data-l3="${i}">${i}</div>`);
        h += `</div>`;
    }
    c.innerHTML = h;
    c.querySelector('.level-2-item')?.click();
}

function renderContent(l2, l3) {
    const c = document.getElementById('content-container');
    const links = siteData[currentL1].links[`${l2}-${l3}`] || [];
    let h = `<h1>📚 ${l2} - ${l3}</h1><div class="link-grid">`;
    links.forEach(link => {
        h += `
        <div class="link-card">
            <h3>${link.name}</h3>
            <div style="margin-top:12px;">
                <a href="${link.url}" target="_blank" class="card-btn">📘 课件</a>
                ${link.pdfUrl ? `<span class="card-btn pdf" onclick="openPdf('${link.pdfUrl}')">📄 搭建图纸</span>` : ''}
            </div>
        </div>`;
    });
    h += `</div>`;
    c.innerHTML = h;
}

function openPdf(url) {
    const div = document.createElement('div');
    div.className = 'pdf-fullscreen';
    div.innerHTML = `<iframe src="${url}"></iframe>`;
    div.onclick = () => div.remove();
    document.body.appendChild(div);
}

document.querySelectorAll('.level-1-item').forEach(i => i.onclick = () => {
    document.querySelectorAll('.level-1-item').forEach(x => x.classList.remove('active'));
    i.classList.add('active');
    currentL1 = i.dataset.target;
    renderMenu();
});

document.getElementById('menu-container').onclick = e => {
    if (e.target.classList.contains('level-2-item')) {
        document.querySelectorAll('.level-2-item').forEach(x => x.classList.remove('active'));
        e.target.classList.add('active');
        renderContent(e.target.dataset.l2, e.target.dataset.l3);
    }
};

renderMenu();
</script>
